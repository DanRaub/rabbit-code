<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORC 140 RS Jabsco System Trainer</title>
<style>
:root {
  --bilge: #E2C601;
  --flow-ok: #49A7FF;
  --flow-err: #F2625B;
  --valve-open-fill: #BEFFC5;
  --valve-open-stroke: #307838;
  --valve-closed-fill: #FFFFFF;
  --valve-closed-stroke: #C1C6CE;
  --pipe-stroke: #C1C6CE;
  --ink: #1F2021;
  --ink-soft: #4a4a52;
  --paper: #FAFAFC;
  --line: #D9D9D9;
  --line-soft: #ECECF0;
  --accent: #1F2021;
  --ok-tint: rgba(58, 168, 71, 0.18);
  --warn: #F2625B;
  --warn-soft: #FEEDEB;
  --ok: #307838;
  --ok-soft: #E8F7EA;
  --info-soft: #E8F2FE;
}

* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  line-height: 1.4;
}

.app {
  max-width: 640px;
  margin: 0 auto;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 12px;
}
.title { font-size: 14px; font-weight: 600; letter-spacing: 0.01em; }
.subtitle { font-size: 11px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.08em; }

.mode-switch {
  display: inline-flex;
  background: #EFEFF3;
  border-radius: 999px;
  padding: 3px;
  font-size: 12px;
  font-weight: 500;
}
.mode-switch button {
  border: 0;
  background: transparent;
  padding: 6px 12px;
  border-radius: 999px;
  cursor: pointer;
  color: var(--ink-soft);
  font: inherit;
  font-weight: 500;
}
.mode-switch button.active {
  background: white;
  color: var(--ink);
  box-shadow: 0 1px 2px rgba(0,0,0,0.08);
}

.toolbar {
  display: flex;
  gap: 8px;
  align-items: center;
  font-size: 12px;
  margin-bottom: 12px;
}
.btn {
  border: 1px solid var(--line);
  background: white;
  padding: 7px 12px;
  border-radius: 6px;
  cursor: pointer;
  font: inherit;
  font-size: 12px;
  color: var(--ink);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: background 0.1s;
}
.btn:hover { background: #F5F5F8; }
.btn-primary {
  background: var(--ink);
  border-color: var(--ink);
  color: white;
}
.btn-primary:hover { background: #000; }

.drill-panel {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 12px 14px;
  background: white;
  margin-bottom: 12px;
  font-size: 13px;
  display: none;
}
.drill-panel.show { display: block; }
.drill-label {
  font-size: 10px;
  color: var(--ink-soft);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 4px;
  font-weight: 600;
}
.drill-brief {
  font-weight: 500;
  margin-bottom: 10px;
}
.drill-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}
.drill-result {
  font-size: 12px;
  font-weight: 500;
  padding: 6px 10px;
  border-radius: 6px;
  display: none;
}
.drill-result.show { display: inline-block; }
.drill-result.pass { background: var(--ok-soft); color: var(--ok); }
.drill-result.fail { background: var(--warn-soft); color: var(--warn); }

.diagram-wrap {
  background: white;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 12px;
  overflow: hidden;
  position: relative;
}
.diagram {
  width: 100%;
  height: auto;
  display: block;
  max-height: 78vh;
}

/* SVG class restoration since we stripped inline styles */
.diagram .st0 { fill: #C1C6CE; }
.diagram .st1 { fill: #FFFFFF; }
.diagram .st2 { fill: #9F9FA6; }
.diagram .st3 { fill: #E2C601; }
.diagram .st4 { fill: #444449; }
.diagram .st7 { fill-rule: evenodd; clip-rule: evenodd; fill: #C1C6CE; }
.diagram .st8 { fill: #FFFFFF; stroke: #C1C6CE; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; stroke-miterlimit: 1.5; }
.diagram .st9 { fill: none; stroke: var(--pipe-stroke); stroke-width: 3; }
.diagram .st11 { fill: #49A7FF; }
.diagram .st14 { fill: #F2625B; }
.diagram .st16 { fill: none; stroke: #C1C6CE; stroke-width: 1.5; }
.diagram .st17 { fill: none; stroke: #C1C6CE; }
.diagram .st18 { fill: #F0F0F5; }

/* Make valves and pumps clickable */
.diagram [id^="valve-"],
.diagram [id^="pump-"] {
  cursor: pointer;
}
.diagram [id^="valve-"]:hover .vbody,
.diagram [id^="pump-"]:hover .pbody {
  filter: brightness(0.97);
}

/* Flow overlays (added dynamically) */
.flow-overlay {
  fill: none;
  stroke: var(--flow-ok);
  stroke-width: 6;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 18 10;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.18s;
}
.flow-overlay.active {
  opacity: 1;
  animation: flow 1.4s linear infinite;
}
.flow-overlay.reverse {
  animation: flow-rev 1.4s linear infinite;
}
.flow-overlay.bilge-stage {
  stroke: var(--bilge);
  stroke-width: 5;
  stroke-dasharray: none;
  animation: none !important;
}
.flow-overlay.error {
  stroke: var(--flow-err);
}

@keyframes flow {
  from { stroke-dashoffset: 0; }
  to   { stroke-dashoffset: -28; }
}
@keyframes flow-rev {
  from { stroke-dashoffset: 0; }
  to   { stroke-dashoffset: 28; }
}

/* Engine-running tint */
.engine-running {
  fill: var(--ok-tint);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
}
.engine-running.on { opacity: 1; }

/* Status row */
.status-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 12px;
}
.status-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 12px;
  background: white;
  font-size: 12px;
}
.status-card .label {
  font-size: 10px;
  color: var(--ink-soft);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
  margin-bottom: 3px;
}
.status-card .state {
  font-weight: 600;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.state-ok    .dot { background: var(--ok); }
.state-off   .dot { background: #C1C6CE; }
.state-fire  .dot { background: var(--flow-err); }
.state-err   .dot { background: var(--warn); }
.state-ok    { color: var(--ok); }
.state-off   { color: var(--ink-soft); }
.state-fire  { color: var(--flow-err); }
.state-err   { color: var(--warn); }

.warnings {
  margin-top: 10px;
  font-size: 12px;
}
.warning {
  background: var(--warn-soft);
  color: var(--warn);
  padding: 8px 12px;
  border-radius: 6px;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.warning::before { content: "!"; font-weight: 700; }

.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid var(--line);
  font-size: 11px;
  color: var(--ink-soft);
}
.legend-item { display: inline-flex; align-items: center; gap: 5px; }
.legend-swatch {
  width: 14px; height: 14px;
  border-radius: 3px;
  display: inline-block;
  border: 1px solid rgba(0,0,0,0.06);
}

/* Hide Key (legend) group from imported SVG since we have our own */
.diagram #Key { display: none; }

/* Bilge head pulse for drill scenarios */
@keyframes pulse-bilge {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.18); opacity: 0.85; }
}
.diagram .bilge-target {
  transform-box: fill-box;
  transform-origin: center;
  animation: pulse-bilge 1.1s ease-in-out infinite;
}

.help {
  font-size: 11px;
  color: var(--ink-soft);
  margin-top: 8px;
  line-height: 1.45;
}
</style>
</head>

      <div class="title">Jabsco Bilge / Fire System Trainer</div>

<script>
(function(){
'use strict';

// ===== Plumbing model =====
// Zone valves grouped by manifold side
const ZONES = {
  'engine-room-aft':      { id: 'valve-zone-engine-room-aft-port',      side: 'port', pipe: 'pipe-zone-engine-room-aft',      bilge: 'bilge-head-engine-room-aft',      label: 'Engine room aft',  default: true,  flowReverse: false },
  'tiller-flat':          { id: 'valve-zone-tiller-flat-port',          side: 'port', pipe: 'pipe-zone-tiller-flat',          bilge: 'bilge-head-tiller-flat',          label: 'Tiller flat',       default: false, flowReverse: false },
  'engine-room-fwd':      { id: 'valve-zone-engine-room-fwd-stbd',      side: 'stbd', pipe: 'pipe-zone-engine-room-fwd-stbd', bilge: 'bilge-head-engine-room-fwd',      label: 'Engine room fwd',   default: true,  flowReverse: false },
  'accommodation':        { id: 'valve-zone-accommodation-stbd',        side: 'stbd', pipe: 'pipe-zone-accommodation-stbd',   bilge: 'bilge-head-accommodation',        label: 'Accommodation',     default: false, flowReverse: false },
  'fuel-compartment':     { id: 'valve-zone-fuel-compartment-stbd',     side: 'stbd', pipe: 'pipe-zone-fuel-stbd',            bilge: 'bilge-head-engine-room',          label: 'Fuel compartment',  default: false, flowReverse: false }
};

const PUMPS = {
  port: { id: 'pump-jabsco-port', threeway: 'valve-3way-port', sidePipe3way: 'pipe-3way-to-pump-port', sidePipePump: 'pipe-pump-to-hull-port', seacockPipe: 'pipe-seacock-port', label: 'Port' },
  stbd: { id: 'pump-jabsco-stbd', threeway: 'valve-3way-stbd', sidePipe3way: 'pipe-3way-to-pump-stbd', sidePipePump: 'pipe-pump-to-hull-stbd', seacockPipe: 'pipe-seacock-stbd', label: 'Stbd' }
};

const CROSSOVER = { valveId: 'valve-crossover', pipeId: 'pipe-crossover' };

// Animation reverse flags. Adjust per-pipe if any visually run wrong direction.
const PIPE_FLOW_REVERSE = {
  'pipe-zone-engine-room-aft':      false,
  'pipe-zone-tiller-flat':          false,
  'pipe-zone-engine-room-fwd-stbd': false,
  'pipe-zone-accommodation-stbd':   false,
  'pipe-zone-fuel-stbd':            false,
  'pipe-crossover':                 false,
  'pipe-3way-to-pump-port':         true,   // path drawn from pump down; flow is up to pump
  'pipe-3way-to-pump-stbd':         false,
  'pipe-pump-to-hull-port':         true,   // flow goes pump -> hull (left)
  'pipe-pump-to-hull-stbd':         false,
  'pipe-seacock-port':              true,   // flow from sea (left) into 3-way
  'pipe-seacock-stbd':              false
};

// ===== App state =====
const state = {
  mode: 'explore',
  zones: {},          // zone-key -> open bool
  threeWay: { port: 'bilge', stbd: 'bilge' },   // bilge | fire
  crossover: false,   // open?
  pumps: { port: false, stbd: false },
  drillScenario: null
};

function applyDefaults() {
  for (const k in ZONES) state.zones[k] = ZONES[k].default;
  state.threeWay.port = 'bilge';
  state.threeWay.stbd = 'bilge';
  state.crossover = false;
  state.pumps.port = false;
  state.pumps.stbd = false;
}

// ===== SVG helpers =====
const svg = document.querySelector('.diagram');

function $(id) { return svg.querySelector('#' + CSS.escape(id)); }

function getPaths(groupId) {
  const g = $(groupId);
  if (!g) return [];
  return Array.from(g.querySelectorAll('path'));
}

function getInnerPipeShape(pipeGroupId) {
  const g = $(pipeGroupId);
  if (!g) return null;
  return g.querySelector('polyline, path, line');
}

// ===== Render: valves =====
function renderZoneValve(key) {
  const cfg = ZONES[key];
  const paths = getPaths(cfg.id);
  if (paths.length < 3) return;
  const [bodyFill, bodyStroke, handle] = paths;
  bodyFill.classList.add('vbody');
  const open = state.zones[key];
  if (open) {
    bodyFill.setAttribute('fill', 'var(--valve-open-fill)');
    bodyStroke.setAttribute('stroke', 'var(--valve-open-stroke)');
    handle.setAttribute('fill', 'var(--valve-open-stroke)');
    // Rotate handle 90deg around valve center
    const b = bodyFill.getBBox();
    const cx = b.x + b.width / 2;
    const cy = b.y + b.height / 2;
    handle.setAttribute('transform', `rotate(90 ${cx} ${cy})`);
  } else {
    bodyFill.setAttribute('fill', 'var(--valve-closed-fill)');
    bodyStroke.setAttribute('stroke', 'var(--valve-closed-stroke)');
    handle.setAttribute('fill', '#444449');
    handle.removeAttribute('transform');
  }
}

function renderCrossover() {
  const paths = getPaths(CROSSOVER.valveId);
  if (paths.length < 3) return;
  const [bodyFill, bodyStroke, handle] = paths;
  bodyFill.classList.add('vbody');
  if (state.crossover) {
    bodyFill.setAttribute('fill', 'var(--valve-open-fill)');
    bodyStroke.setAttribute('stroke', 'var(--valve-open-stroke)');
    handle.setAttribute('fill', 'var(--valve-open-stroke)');
    const b = bodyFill.getBBox();
    const cx = b.x + b.width / 2;
    const cy = b.y + b.height / 2;
    handle.setAttribute('transform', `rotate(90 ${cx} ${cy})`);
  } else {
    bodyFill.setAttribute('fill', 'var(--valve-closed-fill)');
    bodyStroke.setAttribute('stroke', 'var(--valve-closed-stroke)');
    handle.setAttribute('fill', '#444449');
    handle.removeAttribute('transform');
  }
}

function renderThreeWay(side) {
  const tw = PUMPS[side].threeway;
  const paths = getPaths(tw);
  if (paths.length < 3) return;
  const [bodyFill, bodyStroke, handle] = paths;
  bodyFill.classList.add('vbody');
  const mode = state.threeWay[side];
  if (mode === 'fire') {
    bodyFill.setAttribute('fill', 'var(--valve-open-fill)');
    bodyStroke.setAttribute('stroke', 'var(--valve-open-stroke)');
    handle.setAttribute('fill', 'var(--valve-open-stroke)');
    // Horizontal mirror around body center to swap L-shape direction
    const b = bodyFill.getBBox();
    const cx = b.x + b.width / 2;
    handle.setAttribute('transform', `matrix(-1 0 0 1 ${cx * 2} 0)`);
  } else {
    bodyFill.setAttribute('fill', 'var(--valve-closed-fill)');
    bodyStroke.setAttribute('stroke', 'var(--valve-closed-stroke)');
    handle.setAttribute('fill', '#444449');
    handle.removeAttribute('transform');
  }
}

// ===== Render: pumps =====
function renderPump(side) {
  const cfg = PUMPS[side];
  const g = $(cfg.id);
  if (!g) return;
  // pump group has: outer pill, outer pill stroke, JABSCO text, inner pill, inner knob
  // Find: the inner toggle pill (rounded rect ~40x19) and the knob (rounded rect ~11x11)
  const rects = Array.from(g.querySelectorAll('rect'));
  if (rects.length < 2) return;
  // last two rects: pill bg, knob
  const pillBg = rects[rects.length - 2];
  const knob = rects[rects.length - 1];
  pillBg.classList.add('pbody');

  const on = state.pumps[side];
  if (on) {
    pillBg.setAttribute('fill', '#D0F0D6');
    knob.setAttribute('fill', '#307838');
    // Slide knob to the right side of pill
    const pillX = parseFloat(pillBg.getAttribute('x'));
    const pillW = parseFloat(pillBg.getAttribute('width'));
    const knobW = parseFloat(knob.getAttribute('width'));
    const newKnobX = pillX + pillW - knobW - 4;
    knob.setAttribute('x', newKnobX);
  } else {
    pillBg.setAttribute('fill', '#F0F0F5');
    knob.setAttribute('fill', '#C1C6CE');
    // Reset knob to the left side
    const pillX = parseFloat(pillBg.getAttribute('x'));
    const newKnobX = pillX + 4;
    knob.setAttribute('x', newKnobX);
  }
}

// ===== Flow overlays =====
// For each pipe group, clone its inner shape into a sibling overlay we can colorize/animate.
function setupFlowOverlays() {
  const pipeIds = [
    'pipe-zone-engine-room-aft','pipe-zone-tiller-flat',
    'pipe-zone-engine-room-fwd-stbd','pipe-zone-accommodation-stbd','pipe-zone-fuel-stbd',
    'pipe-crossover','pipe-3way-to-pump-port','pipe-3way-to-pump-stbd',
    'pipe-pump-to-hull-port','pipe-pump-to-hull-stbd',
    'pipe-seacock-port','pipe-seacock-stbd'
  ];
  pipeIds.forEach(pid => {
    const shape = getInnerPipeShape(pid);
    if (!shape) return;
    const overlay = shape.cloneNode(true);
    overlay.removeAttribute('class');
    overlay.setAttribute('class', 'flow-overlay');
    if (PIPE_FLOW_REVERSE[pid]) overlay.classList.add('reverse');
    overlay.id = pid + '__flow';
    shape.parentNode.appendChild(overlay);
  });
}

function setPipeFlow(pipeId, state) {
  // state: 'off' | 'ok' | 'err'
  const overlay = svg.querySelector('#' + CSS.escape(pipeId + '__flow'));
  if (!overlay) return;
  overlay.classList.remove('active', 'error');
  if (state === 'ok') overlay.classList.add('active');
  else if (state === 'err') overlay.classList.add('active', 'error');
}

function clearAllFlows() {
  svg.querySelectorAll('.flow-overlay').forEach(o => o.classList.remove('active','error'));
}

// ===== Bilge head water indicator =====
function setBilgeHead(zoneKey, on, err) {
  const cfg = ZONES[zoneKey];
  const g = $(cfg.bilge);
  if (!g) return;
  const path = g.querySelector('path');
  if (!path) return;
  // bilge head is yellow when zone valve open (water at intake). Red when err.
  if (err) path.setAttribute('fill', 'var(--flow-err)');
  else if (on) path.setAttribute('fill', 'var(--bilge)');
  else path.setAttribute('fill', 'var(--bilge)');
  // Always yellow at intake. Pulse only when in drill target.
}

// ===== Solver: determine flow =====
// Returns { perSide: { port: { mode, zonesActive[], error[], errorReasons[] }, stbd: {...} }, warnings: [] }
function solve() {
  const result = {
    pumps: { port: { active:false, mode:'off', zones:[], error:false, reasons:[] },
             stbd: { active:false, mode:'off', zones:[], error:false, reasons:[] } },
    warnings: []
  };

  // Open zones grouped by manifold side
  const openByside = { port: [], stbd: [] };
  for (const k in ZONES) {
    if (state.zones[k]) openByside[ZONES[k].side].push(k);
  }

  // Crossover constraints (only enforced when crossover open AND a pump is running)
  const eitherPumpOn = state.pumps.port || state.pumps.stbd;
  const totalOpenZones = openByside.port.length + openByside.stbd.length;
  const fireOpen = (state.threeWay.port === 'fire') || (state.threeWay.stbd === 'fire');
  const crossoverViolation = state.crossover && eitherPumpOn && (
    (state.pumps.port && state.pumps.stbd) ||
    (totalOpenZones > 1) ||
    fireOpen
  );

  if (state.crossover && state.pumps.port && state.pumps.stbd) {
    result.warnings.push('Crossover open with both Jabsco pumps running. Only one pump may run at a time.');
  }
  if (state.crossover && totalOpenZones > 1 && eitherPumpOn) {
    result.warnings.push('Crossover open with more than one zone valve open. Close all but one zone.');
  }
  if (state.crossover && fireOpen && eitherPumpOn) {
    result.warnings.push('Crossover open with a 3-way in FIRE. Both 3-ways must be in BILGE when crossover is open.');
  }

  ['port','stbd'].forEach(side => {
    const r = result.pumps[side];
    if (!state.pumps[side]) { r.mode = 'off'; return; }
    r.active = true;
    const twMode = state.threeWay[side];
    if (twMode === 'fire') {
      r.mode = 'fire';
      // Fire mode draws from sea cock - always available
      // No bilge needed
      return;
    }
    // Bilge mode
    r.mode = 'bilge';
    let reachable = openByside[side].slice();
    if (state.crossover && !crossoverViolation) {
      reachable = reachable.concat(openByside[side === 'port' ? 'stbd' : 'port']);
    }
    r.zones = reachable;
    if (reachable.length === 0) {
      r.error = true;
      r.reasons.push(`${PUMPS[side].label} Jabsco is running dry: no zone valve open on its manifold.`);
    }
    if (crossoverViolation) {
      r.error = true;
    }
  });

  if (result.pumps.port.error) result.warnings.push(...result.pumps.port.reasons);
  if (result.pumps.stbd.error) result.warnings.push(...result.pumps.stbd.reasons);

  return result;
}

// ===== Render flows from solve result =====
function renderFlows() {
  clearAllFlows();
  const r = solve();

  ['port','stbd'].forEach(side => {
    const p = r.pumps[side];
    if (!p.active) return;
    const cfg = PUMPS[side];
    const err = p.error;
    const flowState = err ? 'err' : 'ok';

    if (p.mode === 'fire') {
      setPipeFlow(cfg.seacockPipe, flowState);
      setPipeFlow(cfg.sidePipe3way, flowState);
      setPipeFlow(cfg.sidePipePump, flowState);
    } else {
      // Bilge mode
      if (p.zones.length === 0) {
        // Pump running dry - draw red on the suction circuit
        setPipeFlow(cfg.sidePipe3way, 'err');
        setPipeFlow(cfg.sidePipePump, 'err');
      } else {
        // Active zones light up their zone pipes
        p.zones.forEach(zk => setPipeFlow(ZONES[zk].pipe, flowState));
        // 3-way to pump and pump to hull always carry the flow
        setPipeFlow(cfg.sidePipe3way, flowState);
        setPipeFlow(cfg.sidePipePump, flowState);
        // Crossover lights up if any reachable zone is on opposite side
        const oppositeZones = p.zones.filter(zk => ZONES[zk].side !== side);
        if (oppositeZones.length > 0) {
          setPipeFlow('pipe-crossover', flowState);
        }
      }
    }
  });
  updateStatusUI(r);
  updateBilgeHeads();
}

function updateBilgeHeads() {
  // Bilge heads stay yellow always (water present at intake). They show red if drill marks them as target & not yet handled.
  // No-op for now; bilge heads have their own static color.
}

function updateStatusUI(r) {
  ['port','stbd'].forEach(side => {
    const el = document.getElementById('status-' + side);
    const p = r.pumps[side];
    el.className = 'state';
    let cls = 'state-off';
    let txt = 'Off';
    if (p.active) {
      if (p.error) { cls = 'state-err'; txt = 'DRY / FAULT'; }
      else if (p.mode === 'fire') { cls = 'state-fire'; txt = 'FIRE pumping'; }
      else { cls = 'state-ok'; txt = `Pumping ${p.zones.length === 1 ? ZONES[p.zones[0]].label.toLowerCase() : p.zones.length + ' zones'}`; }
    }
    el.classList.add(cls);
    el.querySelector('.text').textContent = txt;
  });
  const wrap = document.getElementById('warnings');
  wrap.innerHTML = '';
  r.warnings.forEach(w => {
    const div = document.createElement('div');
    div.className = 'warning';
    div.appendChild(document.createTextNode(w));
    wrap.appendChild(div);
  });
}

// ===== Render everything =====
function renderAll() {
  for (const k in ZONES) renderZoneValve(k);
  renderCrossover();
  renderThreeWay('port');
  renderThreeWay('stbd');
  renderPump('port');
  renderPump('stbd');
  renderFlows();
}

// ===== Interaction =====
function wireClicks() {
  for (const k in ZONES) {
    const g = $(ZONES[k].id);
    if (!g) continue;
    g.addEventListener('click', () => {
      state.zones[k] = !state.zones[k];
      renderAll();
    });
  }
  const x = $(CROSSOVER.valveId);
  if (x) x.addEventListener('click', () => {
    state.crossover = !state.crossover;
    renderAll();
  });
  ['port','stbd'].forEach(side => {
    const tw = $(PUMPS[side].threeway);
    if (tw) tw.addEventListener('click', () => {
      state.threeWay[side] = state.threeWay[side] === 'bilge' ? 'fire' : 'bilge';
      renderAll();
    });
    const pump = $(PUMPS[side].id);
    if (pump) pump.addEventListener('click', () => {
      state.pumps[side] = !state.pumps[side];
      renderAll();
    });
  });
}

// ===== Drill mode =====
const DRILL_SCENARIOS = [
  {
    id: 'flooding-tiller',
    brief: 'Flooding in the tiller flat. Configure to pump.',
    check: () => {
      const ok = state.pumps.port && state.zones['tiller-flat'] && state.threeWay.port === 'bilge';
      const reasons = [];
      if (!state.pumps.port) reasons.push('Port Jabsco not running.');
      if (!state.zones['tiller-flat']) reasons.push('Tiller flat zone valve closed.');
      if (state.threeWay.port !== 'bilge') reasons.push('Port 3-way in FIRE.');
      return { ok, reasons };
    }
  },
  {
    id: 'flooding-accommodation',
    brief: 'Flooding in the accommodation. Configure to pump.',
    check: () => {
      const ok = state.pumps.stbd && state.zones['accommodation'] && state.threeWay.stbd === 'bilge';
      const reasons = [];
      if (!state.pumps.stbd) reasons.push('Stbd Jabsco not running.');
      if (!state.zones['accommodation']) reasons.push('Accommodation zone valve closed.');
      if (state.threeWay.stbd !== 'bilge') reasons.push('Stbd 3-way in FIRE.');
      return { ok, reasons };
    }
  },
  {
    id: 'flooding-fuel',
    brief: 'Flooding in the fuel compartment. Configure to pump.',
    check: () => {
      const ok = state.pumps.stbd && state.zones['fuel-compartment'] && state.threeWay.stbd === 'bilge';
      const reasons = [];
      if (!state.pumps.stbd) reasons.push('Stbd Jabsco not running.');
      if (!state.zones['fuel-compartment']) reasons.push('Fuel compartment zone valve closed.');
      if (state.threeWay.stbd !== 'bilge') reasons.push('Stbd 3-way in FIRE.');
      return { ok, reasons };
    }
  },
  {
    id: 'fire-aside',
    brief: 'Vessel alongside, fire on deck. Configure both Jabsco for firefighting.',
    check: () => {
      const ok = state.pumps.port && state.pumps.stbd
              && state.threeWay.port === 'fire' && state.threeWay.stbd === 'fire'
              && !state.crossover;
      const reasons = [];
      if (!state.pumps.port) reasons.push('Port Jabsco not running.');
      if (!state.pumps.stbd) reasons.push('Stbd Jabsco not running.');
      if (state.threeWay.port !== 'fire') reasons.push('Port 3-way still in BILGE.');
      if (state.threeWay.stbd !== 'fire') reasons.push('Stbd 3-way still in BILGE.');
      if (state.crossover) reasons.push('Crossover must be closed in FIRE.');
      return { ok, reasons };
    }
  },
  {
    id: 'port-pump-fail',
    brief: 'Engine room flooding, port Jabsco failed. Use stbd pump only via crossover.',
    check: () => {
      const ok = !state.pumps.port && state.pumps.stbd
              && state.zones['engine-room-aft']
              && !state.zones['engine-room-fwd'] && !state.zones['accommodation'] && !state.zones['fuel-compartment'] && !state.zones['tiller-flat']
              && state.crossover
              && state.threeWay.stbd === 'bilge';
      const reasons = [];
      if (state.pumps.port) reasons.push('Port Jabsco must be off (failed).');
      if (!state.pumps.stbd) reasons.push('Stbd Jabsco not running.');
      if (!state.crossover) reasons.push('Crossover must be open to reach port manifold.');
      if (!state.zones['engine-room-aft']) reasons.push('Engine room aft zone valve must be open.');
      const otherZones = ['engine-room-fwd','accommodation','fuel-compartment','tiller-flat'].filter(z => state.zones[z]);
      if (otherZones.length) reasons.push('Only one zone valve may be open with crossover.');
      if (state.threeWay.stbd !== 'bilge') reasons.push('Stbd 3-way must be in BILGE.');
      return { ok, reasons };
    }
  },
  {
    id: 'engine-room-both',
    brief: 'Engine room flooding heavily. Use both Jabsco at maximum flow.',
    check: () => {
      const ok = state.pumps.port && state.pumps.stbd
              && state.zones['engine-room-aft'] && state.zones['engine-room-fwd']
              && state.threeWay.port === 'bilge' && state.threeWay.stbd === 'bilge'
              && !state.crossover;
      const reasons = [];
      if (!state.pumps.port) reasons.push('Port Jabsco not running.');
      if (!state.pumps.stbd) reasons.push('Stbd Jabsco not running.');
      if (!state.zones['engine-room-aft']) reasons.push('Engine room aft valve closed.');
      if (!state.zones['engine-room-fwd']) reasons.push('Engine room fwd valve closed.');
      if (state.threeWay.port !== 'bilge') reasons.push('Port 3-way in FIRE.');
      if (state.threeWay.stbd !== 'bilge') reasons.push('Stbd 3-way in FIRE.');
      if (state.crossover) reasons.push('Crossover must be closed when both pumps run.');
      return { ok, reasons };
    }
  }
];

function pickRandomScenario() {
  let pick;
  do { pick = DRILL_SCENARIOS[Math.floor(Math.random() * DRILL_SCENARIOS.length)]; }
  while (state.drillScenario && pick.id === state.drillScenario.id && DRILL_SCENARIOS.length > 1);
  state.drillScenario = pick;
  document.getElementById('drill-brief').textContent = pick.brief;
  document.getElementById('drill-result').classList.remove('show','pass','fail');
}

function setMode(m) {
  state.mode = m;
  document.getElementById('mode-explore').classList.toggle('active', m === 'explore');
  document.getElementById('mode-drill').classList.toggle('active', m === 'drill');
  document.getElementById('drill-panel').classList.toggle('show', m === 'drill');
  document.getElementById('btn-newdrill').style.display = m === 'drill' ? 'inline-flex' : 'none';
  if (m === 'drill') {
    applyDefaults();
    pickRandomScenario();
    renderAll();
  } else {
    state.drillScenario = null;
    applyDefaults();
    renderAll();
  }
}

function checkDrill() {
  if (!state.drillScenario) return;
  const r = state.drillScenario.check();
  const el = document.getElementById('drill-result');
  el.classList.remove('pass','fail');
  el.classList.add('show');
  if (r.ok) {
    el.classList.add('pass');
    el.textContent = 'Correct';
  } else {
    el.classList.add('fail');
    el.textContent = r.reasons[0] || 'Configuration incorrect';
  }
}

// ===== Boot =====
function init() {
  setupFlowOverlays();
  applyDefaults();
  wireClicks();
  renderAll();

  document.getElementById('mode-explore').addEventListener('click', () => setMode('explore'));
  document.getElementById('mode-drill').addEventListener('click',   () => setMode('drill'));
  document.getElementById('btn-reset').addEventListener('click', () => { applyDefaults(); renderAll(); });
  document.getElementById('btn-newdrill').addEventListener('click', () => { applyDefaults(); pickRandomScenario(); renderAll(); });
  document.getElementById('btn-check').addEventListener('click', checkDrill);
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();

})();
</script>
